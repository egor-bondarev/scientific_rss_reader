name: Telegram on Release

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  notify-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAG: ${{ github.event.release.tag_name }}
          NAME: ${{ github.event.release.name }}
          URL: ${{ github.event.release.html_url }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, html, json, urllib.request, urllib.parse
          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          tag = os.environ.get("TAG", "")
          name = os.environ.get("NAME") or f"Release {tag}"
          url = os.environ.get("URL", "")
          repo = os.environ.get("REPO", "")
          text = (
              "<b>🚀 New release</b>\n"
              f"<b>Repo:</b> {html.escape(repo)}\n"
              f"<b>Tag:</b> {html.escape(tag)}\n"
              f"<b>Name:</b> {html.escape(name)}\n"
              f"<a href=\"{html.escape(url)}\">Open release</a>"
          )
          data = urllib.parse.urlencode({
              "chat_id": chat_id,
              "text": text,
              "parse_mode": "HTML",
              "disable_web_page_preview": "false",
          }).encode("utf-8")
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=data,
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              body = resp.read().decode("utf-8")
              js = json.loads(body)
              if not js.get("ok"):
                  raise SystemExit(body)
          print("Telegram notified")
          PY